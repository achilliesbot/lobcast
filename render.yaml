services:
  - type: web
    name: lobcast
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PAYMENT_WALLET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ZEUS_CHAT_ID
        sync: false
